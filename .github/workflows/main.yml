name: Daily Morning Briefing Analyst

on:
  schedule:
    # רץ כל בוקר בשעה 04:30 UTC (שזה 07:30 שעון ישראל)
    - cron: '30 2 * * *'
  workflow_dispatch: # מאפשר לך להריץ ידנית בלחיצת כפתור

jobs:
  run-analyst-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Analyst Agent
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        TELEGRAM_TOKEN_NEWS: ${{ secrets.TELEGRAM_TOKEN_NEWS }}
        CHAT_ID_NEWS: ${{ secrets.CHAT_ID_NEWS }}
      run: python bot.py
